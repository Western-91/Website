<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Western 91 Security LLC</title>
    <meta name="description"
        content="Western 91 Security LLC — Personal Cybersecurity Consulting based in St. Louis, MO.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600&family=Outfit:wght@300;400&display=swap');

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Raleway', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        main {
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: clamp(1.2rem, 2.8vw, 2.2rem);
            font-weight: 300;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #ffffff;
            white-space: nowrap;
        }

        h1 .num {
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
            letter-spacing: 0.08em;
        }

        .divider {
            width: 48px;
            height: 1px;
            background-color: #333;
            margin: 1.5rem auto;
        }

        p {
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            color: #666;
            text-transform: uppercase;
        }

        .principal {
            font-size: 0.75rem;
            margin-top: 0.6rem;
            color: #555;
            letter-spacing: 0.06em;
            text-transform: none;
        }
    </style>
</head>

<body>
    <main>
        <h1>Western <span class="num">91</span> Security</h1>
        <div class="divider"></div>
        <p>St. Louis, MO</p>
        <p class="principal">Jared Mayron · Principal</p>
    </main>
</body>

</html>
